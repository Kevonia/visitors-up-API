# Render Blueprint — VMS API (backend)
# ------------------------------------
# Lives in the `api` repo. Deploys:
#   - vms-api        : FastAPI web service (Docker)
#   - vms-zoho-sync  : daily cron that refreshes every resident's payment list
#                      (White/Yellow/Red) + delinquency from Zoho
#   - vms-db         : managed Postgres
#   - vms-redis      : Key Value (Redis)
# The admin app deploys separately from its own repo (admin/render.yaml).
#
# First deploy:
#   1. Render Dashboard -> New -> Blueprint -> pick the `api` repo.
#   2. Set every env var marked "sync: false" in the `vms-shared` group. In
#      particular set SECRET_KEY and PII_ENCRYPTION_KEY to long random strings —
#      the web service and the cron share this ONE group so they use the SAME
#      PII key (the cron encrypts PII; a mismatch would write unreadable data).
#      NEVER change PII_ENCRYPTION_KEY after the first deploy.
#   3. Set CORS_ALLOW_ORIGINS to the admin app's real URL (and the admin's
#      VITE_API_BASE_URL to this API's URL).
#   4. One-time: open the API shell and seed the allowlist from Zoho:
#        python scripts/seed_allowlist_from_zoho.py
#      (kept out of preDeploy — it truncates data.)

databases:
  - name: vms-db
    databaseName: vms
    user: vms
    plan: basic_256mb          # free tier expires after 30 days — use a paid plan for prod
    region: virginia           # closest US region to Jamaica; keep all services here

# Env shared by the web service AND the cron. Kept in one group so both use the
# same secrets — crucially the same PII_ENCRYPTION_KEY. The per-service DB/Redis
# wiring stays on each service (fromDatabase/fromService can't live in a group).
envVarGroups:
  - name: vms-shared
    envVars:
      # --- Environment / hardening ---
      - key: APP_ENV
        value: production        # makes config fail closed on insecure defaults
      - key: CORS_ALLOW_ORIGINS
        value: https://vms-admin.onrender.com   # set to the admin app's real URL

      # --- Security keys (set one strong random value each) ---
      - key: SECRET_KEY
        sync: false              # JWT signing key
      - key: PII_ENCRYPTION_KEY
        sync: false              # AES-SIV PII key — NEVER change after first deploy
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"

      # --- App behaviour ---
      - key: DEV_SKIP_ZOHO
        value: "false"
      - key: PUBLIC_BASE_URL
        value: https://vms-api.onrender.com   # update if the real URL differs
      - key: RED_BALANCE_THRESHOLD
        value: "18000"
      - key: ZOHO_CACHE_TTL
        value: "21600"           # 6h: how long /users/me + the gate trust the cache
      - key: GATE_BLOCK_DELINQUENT
        value: "true"

      # --- Zoho Invoice API ---
      - key: ZOHO_API_URL
        value: https://www.zohoapis.com/invoice/v3
      - key: ZOHO_ORG_ID
        value: "768586532"
      - key: CLIENT_ID
        sync: false
      - key: CLIENT_SECRET
        sync: false
      - key: REFRESH_TOKEN
        sync: false
      - key: ACCESS_TOKEN
        sync: false

      # --- Notifications (Brevo email/SMS) ---
      - key: NOTIFICATIONS_ENABLED
        value: "true"
      - key: NOTIFICATIONS_TRANSPORT
        value: brevo
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        value: no-reply@twickenhamglades.com
      - key: BREVO_SENDER_NAME
        value: Twickenham Glades
      - key: BREVO_SMS_SENDER
        value: TwickGlades

      # --- Bootstrap accounts (set strong values) ---
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_PHONE
        sync: false
      - key: SECURITY_EMAIL
        sync: false
      - key: SECURITY_PASSWORD
        sync: false
      - key: SECURITY_PHONE
        sync: false

services:
  # ---------------------------------------------------------------------------
  # Redis / Key Value — token blacklist, rate limiting, response cache
  # ---------------------------------------------------------------------------
  - type: keyvalue             # older Render accounts: use `type: redis`
    name: vms-redis
    plan: free                 # 25 MB is plenty for tokens + cache
    region: virginia
    ipAllowList: []            # empty = internal connections only (recommended)

  # ---------------------------------------------------------------------------
  # FastAPI backend (Docker)
  # ---------------------------------------------------------------------------
  - type: web
    name: vms-api
    runtime: docker
    region: virginia
    plan: starter              # ~$7/mo, always-on. Bump to `standard` if it feels slow.
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # Override the Dockerfile's --reload CMD; bind to Render's $PORT.
    dockerCommand: sh -c "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    # Runs once before each new version goes live: apply migrations + ensure the
    # admin/security accounts exist (idempotent). Allowlist seeding is manual.
    preDeployCommand: sh -c "alembic upgrade head && python scripts/seed_prod.py"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - fromGroup: vms-shared
      # Database (wired automatically from vms-db)
      - key: DATABASE_URL
        fromDatabase: { name: vms-db, property: connectionString }
      - key: POSTGRES_HOST
        fromDatabase: { name: vms-db, property: host }
      - key: POSTGRES_PORT
        fromDatabase: { name: vms-db, property: port }
      - key: POSTGRES_USER
        fromDatabase: { name: vms-db, property: user }
      - key: POSTGRES_PASSWORD
        fromDatabase: { name: vms-db, property: password }
      - key: POSTGRES_DB
        fromDatabase: { name: vms-db, property: database }
      # Redis (wired automatically from vms-redis)
      - key: REDIS_URL
        fromService: { type: keyvalue, name: vms-redis, property: connectionString }

  # ---------------------------------------------------------------------------
  # Daily payment-list / delinquency refresh (Zoho -> DB cache)
  # The list a resident is on can change daily, so this keeps every resident
  # fresh regardless of whether they open the app. The gate also lazily refreshes
  # a single resident at check-in if their cache is stale.
  # ---------------------------------------------------------------------------
  - type: cron
    name: vms-zoho-sync
    runtime: docker
    region: virginia
    schedule: "0 6 * * *"      # daily 06:00 UTC (~1am Jamaica)
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: sh -c "python scripts/sync_zoho.py"
    envVars:
      - fromGroup: vms-shared
      - key: DATABASE_URL
        fromDatabase: { name: vms-db, property: connectionString }
      - key: POSTGRES_HOST
        fromDatabase: { name: vms-db, property: host }
      - key: POSTGRES_PORT
        fromDatabase: { name: vms-db, property: port }
      - key: POSTGRES_USER
        fromDatabase: { name: vms-db, property: user }
      - key: POSTGRES_PASSWORD
        fromDatabase: { name: vms-db, property: password }
      - key: POSTGRES_DB
        fromDatabase: { name: vms-db, property: database }
      - key: REDIS_URL
        fromService: { type: keyvalue, name: vms-redis, property: connectionString }
