version: '3.8'

# Full local stack: FastAPI + Postgres + Redis + the admin web app.
#   docker compose up --build
# Postgres/Redis credentials fall back to sensible defaults, so this works even
# with a blank .env. Secrets (Zoho, SECRET_KEY) are still read from api/.env.

services:
  web:
    build: .
    # Host port is configurable to avoid clashes with other local services.
    # e.g. API_PORT=8001 docker compose up
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    # Override connection settings so the API talks to the compose db/redis,
    # regardless of what .env points at. These take precedence over env_file.
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vms}
      POSTGRES_DB: ${POSTGRES_DB:-vms}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql://${POSTGRES_USER:-vms}:${POSTGRES_PASSWORD:-vms}@db:5432/${POSTGRES_DB:-vms}
      REDIS_URL: redis://redis:6379/0
      # Browser origins allowed by CORS. deploy.sh sets this to the public host so
      # the admin app (served on port 80) can call the API. Defaults suit local dev.
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:8080,http://localhost:5173}
      # Public HTTPS base for payment checkout/return + IPG bridge links (deploy.sh
      # sets this to the sslip.io host; defaults to localhost for local dev).
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8001}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python scripts/seed_prod.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # RQ background worker: runs off-request jobs (stale Zoho refresh at the gate,
  # mass announcement push). Same image/env as web; no ports, no migrations.
  worker:
    build: .
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vms}
      POSTGRES_DB: ${POSTGRES_DB:-vms}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql://${POSTGRES_USER:-vms}:${POSTGRES_PASSWORD:-vms}@db:5432/${POSTGRES_DB:-vms}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "rq worker -u $${REDIS_URL} default"

  # Scheduled jobs. On Render these were two `type: cron` services (see
  # render.yaml); the EC2 docker-compose deploy has no cron runtime, so they run
  # here as long-lived containers on a sleep loop. Without these the resident
  # roster (payment list / standing) never refreshes from Zoho and in-app
  # payments never reconcile — the roster freezes at its last-synced values.

  # Daily: refresh every resident's dues/standing from the accounting provider.
  # Mirrors render.yaml's `vms-zoho-sync` (was "0 6 * * *"). Runs once at start
  # (so a deploy immediately re-syncs) then every 24h.
  scheduler-accounting:
    build: .
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vms}
      POSTGRES_DB: ${POSTGRES_DB:-vms}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql://${POSTGRES_USER:-vms}:${POSTGRES_PASSWORD:-vms}@db:5432/${POSTGRES_DB:-vms}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: sh -c "while true; do python scripts/sync_accounting.py || true; sleep 86400; done"

  # Every 15 min: finalize/expire PENDING in-app payments (DimePay has no
  # webhooks). Mirrors render.yaml's `vms-payment-reconcile` ("*/15 * * * *").
  scheduler-reconcile:
    build: .
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vms}
      POSTGRES_DB: ${POSTGRES_DB:-vms}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql://${POSTGRES_USER:-vms}:${POSTGRES_PASSWORD:-vms}@db:5432/${POSTGRES_DB:-vms}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: sh -c "while true; do python scripts/reconcile_payments.py || true; sleep 900; done"

  # Dev email + SMS catcher: captures all notifications (SMS arrive as emails).
  # Web UI at http://localhost:8025, SMTP on 1025.
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vms}
      POSTGRES_DB: ${POSTGRES_DB:-vms}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vms} -d ${POSTGRES_DB:-vms}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  admin:
    build:
      context: ../admin
      args:
        # Baked into the JS bundle; points at the API on the host the *browser*
        # reaches. deploy.sh exports VITE_API_BASE_URL (the HTTPS sslip.io origin)
        # for remote deploys; local dev falls back to the plain-HTTP host below.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://${PUBLIC_HOST:-localhost}:${API_PORT:-8000}/api}
    ports:
      # Admin host port: 8080 for local dev; deploy.sh sets ADMIN_PORT=80.
      - "${ADMIN_PORT:-8080}:80"
    depends_on:
      - web

  # NOTE: the public marketing site is deployed separately to GitHub Pages
  # (https://kevonia.github.io/visitors-up-marketing/), not from this stack, so
  # there is no `marketing` service here (the EC2 deploy ships only api/ + admin/).

volumes:
  postgres_data:
  redis_data:
