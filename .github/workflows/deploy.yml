name: Deploy to EC2

# CI/CD pipeline for the Visitor Management System.
#
# The stack spans two repos that must sit side-by-side on the server:
#   visitors-up-API   -> api/    (this repo; owns deploy.sh + docker-compose.yml)
#   visitors-up-admin -> admin/  (built by compose from ../admin)
#
# Flow:
#   1. The runner checks out BOTH repos and positions deploy.sh at the parent.
#   2. rsync the tree to the EC2 box (server keeps its own api/.env + Docker volumes).
#   3. Run deploy.sh on the box (installs Docker if needed, builds, brings the stack up,
#      seeds only when the DB is empty -> existing data is preserved).
#   4. Always prune unused Docker containers / images / build cache afterwards.

on:
  push:
    branches: [master]
  workflow_dispatch:

# Never run two deploys against the same box at once; let an in-flight deploy finish.
concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  # ── Gate 1: API tests (unit + concurrency regression) must pass ────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: vms
          POSTGRES_PASSWORD: vms
          POSTGRES_DB: vms
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U vms" --health-interval 5s --health-timeout 5s --health-retries 15
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql://vms:vms@localhost:5432/vms
      POSTGRES_USER: vms
      POSTGRES_PASSWORD: vms
      POSTGRES_DB: vms
      POSTGRES_HOST: localhost
      POSTGRES_PORT: '5432'
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-secret-key-not-for-prod-0123456789
      PII_ENCRYPTION_KEY: ci-only-pii-key
      CLIENT_ID: ci
      CLIENT_SECRET: ci
      REFRESH_TOKEN: ci
      ACCESS_TOKEN: ci
      ZOHO_API_URL: https://example.invalid
      PAYMENTS_PROVIDERS: wipay,dimepay,test
      DEFAULT_PAYMENT_PROVIDER: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Apply migrations to the test DB
        run: alembic upgrade head
      - name: Run tests (payments abstraction + concurrency race regression)
        # test_crud..py is an outdated pre-UUID unit test, excluded on purpose.
        # `python -m pytest` puts the repo root on sys.path so `import app` works.
        run: python -m pytest -q tests/test_payments.py tests/test_concurrency.py

  # ── Gate 2: admin app must type-check ──────────────────────────────────────
  admin_check:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout admin repo
        uses: actions/checkout@v4
        with:
          repository: Kevonia/visitors-up-admin
          ref: master
          token: ${{ secrets.ADMIN_REPO_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install admin dependencies
        run: npm ci
      - name: Type-check (vue-tsc)
        run: npm run type-check

  deploy:
    # Block the deploy unless both gates pass.
    needs: [test, admin_check]
    runs-on: ubuntu-latest
    # Secrets (EC2_HOST/USER/SSH_KEY, ADMIN_REPO_TOKEN) live in this GitHub
    # Environment; the job must declare it to read them.
    environment: development

    env:
      SSH_PORT: ${{ secrets.EC2_SSH_PORT || '22' }}
      REMOTE: ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}
      REMOTE_DIR: /opt/vms
      SSH_KEY: /home/runner/.ssh/id_deploy
      # Host IP is itself a secret + key auth -> skip host-key prompts entirely.
      SSH_OPTS: -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR

    steps:
      # --- 1. assemble the full project tree on the runner ---------------------
      - name: Checkout API repo
        uses: actions/checkout@v4
        with:
          path: vms/api

      - name: Checkout Admin repo
        uses: actions/checkout@v4
        with:
          repository: Kevonia/visitors-up-admin
          ref: master
          token: ${{ secrets.ADMIN_REPO_TOKEN }}
          path: vms/admin

      - name: Position deploy.sh at the project root
        run: |
          cp vms/api/deploy.sh vms/deploy.sh
          chmod +x vms/deploy.sh

      # --- 2. SSH setup -------------------------------------------------------
      - name: Configure SSH
        run: |
          mkdir -p /home/runner/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > "$SSH_KEY"
          chmod 600 "$SSH_KEY"
          # Fail early with a clear message if a required secret didn't land
          # (e.g. not added to the 'development' environment).
          grep -q 'PRIVATE KEY' "$SSH_KEY" || { echo "::error::EC2_SSH_KEY secret is empty or not a valid private key. Add it to the 'development' environment."; exit 1; }
          [ -n "${{ secrets.EC2_HOST }}" ] || { echo "::error::EC2_HOST secret is empty. Add it to the 'development' environment."; exit 1; }
          [ -n "${{ secrets.EC2_USER }}" ] || { echo "::error::EC2_USER secret is empty. Add it to the 'development' environment."; exit 1; }
          echo "SSH configured for $REMOTE (port $SSH_PORT)."

      - name: Prepare the EC2 box (deploy dir + rsync)
        run: |
          ssh -i "$SSH_KEY" $SSH_OPTS -p "$SSH_PORT" "$REMOTE" '
            sudo mkdir -p '"$REMOTE_DIR"' &&
            sudo chown -R "$USER":"$USER" '"$REMOTE_DIR"' &&
            command -v rsync >/dev/null 2>&1 || {
              echo "Installing rsync...";
              sudo dnf install -y rsync 2>/dev/null ||
              sudo yum install -y rsync 2>/dev/null ||
              { sudo apt-get update -y && sudo apt-get install -y rsync; };
            }
          '

      # --- 3. ship the code ----------------------------------------------------
      # --delete keeps the server tree in sync, but we protect the server's own
      # api/.env (real secrets, gitignored) and never touch Docker-managed volumes.
      - name: Rsync project to EC2
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.env' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            -e "ssh -i $SSH_KEY $SSH_OPTS -p $SSH_PORT" \
            vms/ "$REMOTE:$REMOTE_DIR/"

      # --- 4. build + start the stack -----------------------------------------
      - name: Deploy on EC2
        run: |
          ssh -i "$SSH_KEY" $SSH_OPTS -p "$SSH_PORT" "$REMOTE" '
            cd '"$REMOTE_DIR"' &&
            chmod +x deploy.sh &&
            ./deploy.sh
          '

      # --- 5. always clean up Docker -----------------------------------------
      # Runs even if the deploy failed. Removes stopped containers, dangling/unused
      # images, and build cache. The running stack and named volumes (postgres_data,
      # redis_data) are NOT in use-> never removed by prune (no --volumes flag).
      - name: Clean up Docker on EC2
        if: always()
        run: |
          ssh -i "$SSH_KEY" $SSH_OPTS -p "$SSH_PORT" "$REMOTE" '
            (docker system prune -af 2>/dev/null || sudo docker system prune -af) || true
          '
